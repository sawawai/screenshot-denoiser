<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Denoiser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <script src="coi-serviceworker.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.all.min.js"></script>
</head>
<body>

<header id="hdr">
  <h1 id="t-title">Fast Image Denoiser</h1>

  <div id="hdr-right">
    <button class="btn" id="btn-save" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12M7.5 10.5l4.5 4.5 4.5-4.5M5 19h14"/>
      </svg>
      <span id="t-btn-save"></span>
    </button>
    <button class="btn" id="btn-new"  disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 2.1-5.8M3 4v5h5"/>
      </svg>
      <span id="t-btn-new"></span>
    </button>
  </div>
  <div class="lang-switch">
    <button class="active" onclick="setLang('ja')">日本語</button>
    <button onclick="setLang('en')">English</button>
  </div>
</header>

<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="canvas-area" id="canvas-area">

  <div id="error-msg"></div>

  <div class="drop-idle" id="drop-idle">
    <div class="drop-circle">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 15l5-5 4 4 3-3 6 6"/>
        <circle cx="8.5" cy="8.5" r="1.3"/>
      </svg>
    </div>
    <div class="drop-label" id="t-drop-label">Drop image here</div>
    <div class="drop-sub" id="t-drop-sub">
      Click to browse &nbsp;·&nbsp; <kbd>Ctrl+V</kbd> to paste<br>
      PNG &nbsp;·&nbsp; JPG &nbsp;·&nbsp; WebP &nbsp;·&nbsp; BMP
    </div>
  </div>

  <p id="t-drop-desc" class="drop-desc"></p>

  <div id="controls-hint">
    <span class="hint-desc" id="t-hint-reveal"></span><span class="hint-key" id="t-hint-key-hover"></span>
    <span class="hint-desc" id="t-hint-compare"></span><span class="hint-key" id="t-hint-key-hold"></span>
    <span class="hint-desc" id="t-hint-zoom"></span><span class="hint-key" id="t-hint-key-scroll"></span>
    <span class="hint-desc" id="t-hint-reset"></span><span class="hint-key" id="t-hint-key-dbl"></span>
    <span class="hint-desc" id="t-hint-save"></span><span class="hint-key"><kbd>Ctrl+S</kbd></span>
    <span class="hint-desc" id="t-hint-new"></span><span class="hint-key"><kbd>Esc</kbd></span>
  </div>

  <div id="notice">
    <strong style="color:#d95c72">Model not found.</strong><br>
    Serve this directory over HTTP so <code>models/s2d_1x.onnx</code> can be fetched.<br>
    Run: <code>python -m http.server 8080</code> then open <code>http://localhost:8080</code>
  </div>

  <div class="viewer" id="viewer">
    <canvas id="cv-before"></canvas>
    <canvas id="cv-after"></canvas>
    <div class="viewer-divider" id="vdivider"></div>
    <div id="view-label"></div>
    <div id="mob-tap-hint"></div>
  </div>

</div>

<div id="bot-bar">
  <div id="t-div-before"></div>
  <div id="t-div-after"></div>
</div>

<div id="mobile-bar">
  <button class="btn" id="mob-save" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12M7.5 10.5l4.5 4.5 4.5-4.5M5 19h14"/>
    </svg>
    <span id="t-mob-save"></span>
  </button>
  <button class="btn" id="mob-new" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 2.1-5.8M3 4v5h5"/>
    </svg>
    <span id="t-mob-new"></span>
  </button>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none">

<script src="main.js"></script>
</body>
</html>
